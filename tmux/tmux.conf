# ==========================
# Albert's tmux config
# ==========================

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /bin/zsh
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g escape-time 0
set -g set-clipboard on

# Enable mouse
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Prefix ---
# Keep C-b as default, add C-a as secondary
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# --- Key bindings ---
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Better splits (intuitive keys, preserve path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window preserves path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Pane synchronization (broadcast)
bind b setw synchronize-panes on \; display "Sync ON"
bind B setw synchronize-panes off \; display "Sync OFF"

# Vi copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Quick session switching
bind s choose-tree -sZ

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# --- Appearance ---
# Status bar
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e]"
set -g status-right "#[fg=#45475a]#[fg=#cdd6f4,bg=#45475a] %H:%M #[fg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa,bold] #{host_short} "

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#f9e2af,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "fg=#cdd6f4,bg=#313244,bold"

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'       # prefix + F for fuzzy finding
set -g @plugin 'tmux-plugins/tmux-open'  # open highlighted file/url

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # auto-save every 15 min

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
