- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- shell:
  - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.zshrc: zshrc
    ~/.zsh_zinit.zsh: zsh_zinit.zsh
    ~/.p10k.zsh: p10k.zsh
    ~/.gitconfig:
      path: git/gitconfig
      force: true
    ~/.gitignore: git/gitignore
    ~/.editorconfig: editorconfig
    ~/.gitattributes: gitattributes
    ~/.mise.toml: mise.toml
    ~/.tmux.conf: tmux/tmux.conf
    ~/.config/nvim: nvim
    ~/.navi: navi
    ~/.config/ttyd: ttyd
    ~/.config/cheat/conf.yml: cheat/conf.yml
    ~/.config/opencode: opencode

- shell:
  - command: |
      if [[ "$(uname -s)" == "Darwin" ]]; then
        git config --global credential.helper osxkeychain
      else
        git config --global credential.helper 'cache --timeout=3600'
      fi
    description: Configuring git credential helper for platform
    stdin: true
    stdout: true
    stderr: true
  - command: |
      if [ ! -d "${XDG_DATA_HOME:-$HOME/.local/share}/zinit" ]; then
        git clone https://github.com/zdharma-continuum/zinit.git "${XDG_DATA_HOME:-$HOME/.local/share}/zinit/zinit.git"
      fi
    description: Installing zinit (if not present)
    stdin: true
    stdout: true
    stderr: true
  - command: |
      if [ ! -d "$HOME/.tmux/plugins/tpm/.git" ]; then
        rm -rf "$HOME/.tmux/plugins/tpm"
        mkdir -p "$HOME/.tmux/plugins"
        git clone https://github.com/tmux-plugins/tpm.git "$HOME/.tmux/plugins/tpm"
      fi
    description: Installing TPM (if not present)
    stdin: true
    stdout: true
    stderr: true
  - command: |
      if [ ! -d "$HOME/.config/cheat/cheatsheets/community/.git" ]; then
        mkdir -p "$HOME/.config/cheat/cheatsheets/personal" "$HOME/.config/cheat/cheatsheets/work"
        git clone --depth 1 https://github.com/cheat/cheatsheets "$HOME/.config/cheat/cheatsheets/community"
      fi
    description: Installing cheat community cheatsheets (if not present)
    stdin: true
    stdout: true
    stderr: true

